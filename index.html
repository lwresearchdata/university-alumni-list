<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Alumni - Intake 29 to 39 | Electrical Engineering</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <!-- Header Section -->
        <div class="header">
            <div class="university-badge">
                <div class="badge-icon">🎓</div>
                <div class="badge-text">EST. 1978</div>
            </div>
            <h1>University of Engineering & Technology</h1>
            <p>Department of Electrical & Electronic Engineering</p>
            <div class="intake-range">Alumni Directory | Intake 29 - Intake 39</div>
        </div>

        <!-- Controls Bar -->
        <div class="controls-bar">
            <div class="filter-section">
                <label>📅 Filter by Intake:</label>
                <select id="intakeFilter">
                    <option value="all">All Intakes (29-39)</option>
                    <option value="29">🎯 Intake 29 - Class of 2014</option>
                    <option value="30">🎯 Intake 30 - Class of 2015</option>
                    <option value="31">🎯 Intake 31 - Class of 2016</option>
                    <option value="32">🎯 Intake 32 - Class of 2017</option>
                    <option value="33">🎯 Intake 33 - Class of 2018</option>
                    <option value="34">🎯 Intake 34 - Class of 2019</option>
                    <option value="35">🎯 Intake 35 - Class of 2020</option>
                    <option value="36">🎯 Intake 36 - Class of 2021</option>
                    <option value="37">🎯 Intake 37 - Class of 2022</option>
                    <option value="38">🎯 Intake 38 - Class of 2023</option>
                    <option value="39">🎯 Intake 39 - Class of 2024</option>
                </select>
            </div>
            <div class="search-section">
                <input type="text" id="searchInput" placeholder="🔍 Search by name or registration number...">
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-number" id="totalAlumni">0</span>
                <span class="stat-label">Total Alumni</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="totalIntakes">11</span>
                <span class="stat-label">Intakes</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="currentIntake">29-39</span>
                <span class="stat-label">Active Range</span>
            </div>
        </div>

        <!-- Alumni Grid -->
        <div class="alumni-grid" id="alumniGrid"></div>

        <!-- Footer -->
        <div class="footer">
            <p>© 2024 University Alumni Association | Connecting Engineers Since 1978</p>
            <div class="admin-access">
                <a href="admin.html" class="admin-link">🔐 Admin Portal</a>
            </div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profileModal" class="modal">
        <div class="modal-card">
            <span class="modal-close">&times;</span>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
