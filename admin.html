<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Alumni Management</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-container">
        <div class="login-screen" id="loginScreen">
            <div class="login-box">
                <h2>🔐 Admin Login</h2>
                <input type="password" id="adminPassword" placeholder="Enter Admin Password" onkeypress="if(event.key==='Enter') checkLogin()">
                <button onclick="checkLogin()">Login</button>
                <div id="loginError" class="error-message"></div>
            </div>
        </div>

        <div class="admin-panel" id="adminPanel" style="display:none;">
            <header>
                <h1>📋 Alumni Management System</h1>
                <button onclick="logout()" class="logout-btn">Logout</button>
            </header>

            <div class="stats-bar">
                <div>Total Alumni: <span id="totalAlumni">0</span></div>
                <div>Intakes: 29-39</div>
            </div>

            <!-- Add/Edit Form -->
            <div class="form-container">
                <h3 id="formTitle">Add New Alumni</h3>
                <form id="alumniForm">
                    <input type="hidden" id="editIndex">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label>Intake Number * (29-39)</label>
                        <input type="number" id="intake" min="29" max="39" required>
                    </div>
                    <div class="form-group">
                        <label>Degree *</label>
                        <input type="text" id="degree" required>
                    </div>
                    <div class="form-group">
                        <label>Graduation Year</label>
                        <input type="number" id="year">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email">
                    </div>
                    <div class="form-group">
                        <label>Current Job/Position</label>
                        <input type="text" id="job">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="phone">
                    </div>
                    <div class="form-group">
                        <label>Location/City</label>
                        <input type="text" id="location">
                    </div>
                    <div class="form-buttons">
                        <button type="submit" class="save-btn">💾 Save Alumni</button>
                        <button type="button" onclick="resetForm()" class="cancel-btn">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- Alumni List Management -->
            <div class="manage-section">
                <h3>Manage Alumni Database</h3>
                <div class="search-bar">
                    <input type="text" id="searchAdmin" placeholder="Search alumni...">
                    <select id="intakeFilter">
                        <option value="all">All Intakes</option>
                        <option value="29">Intake 29</option>
                        <option value="30">Intake 30</option>
                        <option value="31">Intake 31</option>
                        <option value="32">Intake 32</option>
                        <option value="33">Intake 33</option>
                        <option value="34">Intake 34</option>
                        <option value="35">Intake 35</option>
                        <option value="36">Intake 36</option>
                        <option value="37">Intake 37</option>
                        <option value="38">Intake 38</option>
                        <option value="39">Intake 39</option>
                    </select>
                </div>
                <div id="alumniListAdmin" class="alumni-table"></div>
            </div>

            <!-- Import/Export -->
            <div class="import-export">
                <button onclick="exportData()" class="export-btn">📥 Export Data (JSON)</button>
                <button onclick="importData()" class="import-btn">📤 Import Data (JSON)</button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
